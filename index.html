<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Just For You</title><style>body{margin:0;background:linear-gradient(135deg,#ff758c,#ffd3a5);font-family:Segoe UI;color:#fff;overflow-x:hidden}.screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:30px}.card{max-width:800px;background:rgba(255,255,255,.15);backdrop-filter:blur(12px);padding:40px;border-radius:24px;text-align:center}button{padding:14px 26px;border-radius:30px;border:none;font-size:18px;cursor:pointer}.heart{position:fixed;bottom:-20px;animation:f 8s linear forwards}@keyframes f{to{transform:translateY(-120vh);opacity:0}}input,textarea{width:90%;padding:10px;border-radius:10px;border:none;margin:8px}</style></head><body><div id='app' class='screen'><div class='card'><h1>❤️ A Little Surprise ❤️</h1><p id='t'></p><button id='b' style='display:none' onclick='next()'>Continue ❤️</button></div></div><script>const parts=['I made this just for you...','You\'ve crossed my mind more than once lately.','I found myself smiling while remembering the moments we\'ve shared.','Every laugh. Every conversation. Every little memory.','So I thought I\'d ask you something simple...','Can I see you again?','I\'d really love to spend some quality time with you...','And make another beautiful memory together. ❤️'];let i=0,c=0;function type(){if(i<parts.length){if(c<parts[i].length){t.innerHTML+=parts[i][c++];setTimeout(type,35)}else{t.innerHTML+='<br><br>';i++;c=0;setTimeout(type,700)}}else b.style.display='inline-block'}type();function next(){app.innerHTML=`<div class='card'><h2>🌹 Thank you for reading.</h2><p>I'd love to hear from you.</p><h3>Choose a day</h3><input type='date' id='d'><textarea id='m' rows='5' placeholder='Write me a little message...'></textarea><br><button onclick='wa()'>Send to WhatsApp ❤️</button></div>`}function wa(){let d=document.getElementById('d').value;let m=document.getElementById('m').value;let txt='Hi ❤️%0A%0AI would love to see you again.%0AChosen day: '+d+'%0A%0AMessage:%0A'+encodeURIComponent(m);window.open('https://wa.me/254111396540?text='+txt,'_blank')}setInterval(()=>{let e=document.createElement('div');e.className='heart';e.textContent=['❤️','💕','💖','🌹'][Math.floor(Math.random()*4)];e.style.left=Math.random()*100+'vw';e.style.fontSize=(18+Math.random()*25)+'px';document.body.appendChild(e);setTimeout(()=>e.remove(),8000)},300);</script></body></html>
